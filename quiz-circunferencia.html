<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quiz: Centro y radio de una circunferencia</title>

  <!-- MathJax -->
  <script>
    window.MathJax = { tex: { inlineMath: [['\\(','\\)'], ['$', '$']] } };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

  <style>
    body{ margin:0; font-family: Arial, Helvetica, sans-serif; background:#f4f6f8; color:#1a1a1a; }
    header{ background:#0b3c5d; color:white; padding:20px; text-align:center; }
    main{ max-width:900px; margin:20px auto; background:white; padding:20px; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
    .eq{ font-size:1.2em; margin:15px 0; }
    .option{ margin:8px 0; }
    button{ margin-top:10px; padding:8px 14px; font-weight:bold; cursor:pointer; }
    .ok{ color:green; font-weight:700; }
    .bad{ color:red; font-weight:700; }
    .row{ display:flex; gap:10px; flex-wrap:wrap; }
  </style>
</head>

<body>
<header>
  <h1>Centro y radio de una circunferencia</h1>
  <p>Seleccioná la opción correcta</p>
</header>

<main>
  <div id="equation" class="eq"></div>
  <form id="options"></form>

  <div class="row">
    <button type="button" onclick="check()">Verificar</button>
    <button type="button" onclick="newExercise()">Nuevo ejercicio</button>
  </div>

  <p id="feedback"></p>
</main>

<script>
  let correct = ""; // key: "h,k,R" donde R es el lado derecho
  let currentR = 0;

  function rand(min,max){
    return Math.floor(Math.random()*(max-min+1))+min;
  }

  function fmtHx(h){ return h>=0 ? `x-${h}` : `x+${-h}`; }
  function fmtKy(k){ return k>=0 ? `y-${k}` : `y+${-k}`; }

  function isPerfectSquare(n){
    const s = Math.floor(Math.sqrt(n));
    return s*s === n;
  }

  // Genera R: a veces cuadrado perfecto, a veces no
  function pickR(){
    const squares = [1,4,9,16,25,36,49];            // r entero
    const nonsq   = [2,3,5,6,7,8,10,11,12,13,14,15]; // r = sqrt(R)
    const useNonSquare = Math.random() < 0.45;       // 45% no cuadrado (ajustable)
    return useNonSquare ? nonsq[rand(0,nonsq.length-1)] : squares[rand(0,squares.length-1)];
  }

  function radiusText(R){
    if (isPerfectSquare(R)) return `${Math.sqrt(R)}`;     // entero
    return `\\sqrt{${R}}`;                                // raíz
  }

  function renderEquation(h,k,R){
    const hx = fmtHx(h);
    const ky = fmtKy(k);

    const eqDiv = document.getElementById("equation");
    const latex = `\\[(${hx})^2 + (${ky})^2 = ${R}\\]`;

    if (window.MathJax && typeof MathJax.typesetPromise === "function") {
      eqDiv.innerHTML = latex;
      MathJax.typesetPromise();
    } else {
      // fallback sin LaTeX
      eqDiv.textContent = `(${hx})² + (${ky})² = ${R}`;
    }
  }

  function uniqOptions(list){
    const seen = new Set();
    const out = [];
    for(const o of list){
      const key = `${o.h},${o.k},${o.R}`;
      if(!seen.has(key)){
        seen.add(key);
        out.push(o);
      }
    }
    return out;
  }

  function newExercise(){
    const h = rand(-5,5);
    const k = rand(-5,5);
    const R = pickR();         // <-- ahora escogemos R directamente
    currentR = R;

    correct = `${h},${k},${R}`;
    renderEquation(h,k,R);

    // Distractores: variar centro o variar R
    let d1 = {h:h,   k:k,   R: isPerfectSquare(R) ? R+1 : R+2}; // cambia R
    let d2 = {h:h+1, k:k,   R:R};                               // cambia centro
    let d3 = {h:h,   k:k-1, R:R};                               // cambia centro

    if (d2.h > 5) d2.h = h-1;
    if (d3.k < -5) d3.k = k+1;

    let opts = uniqOptions([{h,h:k?0:0},]); // dummy
    opts = uniqOptions([{h:h,k:k,R:R}, d1, d2, d3]);

    while(opts.length < 4){
      const extra = {h: rand(-5,5), k: rand(-5,5), R: pickR()};
      opts = uniqOptions(opts.concat([extra]));
    }

    opts.sort(()=>Math.random()-0.5);

    const form = document.getElementById("options");
    form.innerHTML = "";
    opts.forEach(o=>{
      const key = `${o.h},${o.k},${o.R}`;
      const rTxt = radiusText(o.R);

      form.innerHTML +=
        `<div class="option">
          <label>
            <input type="radio" name="ans" value="${key}">
            Centro (${o.h},${o.k}), \\(r=${rTxt}\\)
          </label>
        </div>`;
    });

    if (window.MathJax && typeof MathJax.typesetPromise === "function") {
      MathJax.typesetPromise();
    }

    const fb = document.getElementById("feedback");
    fb.textContent = "";
    fb.className = "";
  }

  function check(){
    const sel = document.querySelector('input[name="ans"]:checked');
    const fb = document.getElementById("feedback");

    if(!sel){
      fb.textContent = "Elegí una opción.";
      fb.className = "bad";
      return;
    }

    if(sel.value === correct){
      fb.textContent = "Correcto ✔";
      fb.className = "ok";
    } else {
      fb.textContent = "Incorrecto ✘";
      fb.className = "bad";
    }
  }

  newExercise();
</script>
</body>
</html>
